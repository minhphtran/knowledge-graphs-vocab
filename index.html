<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>Example vocabulary</title><style>:root{color-scheme:light dark}*{box-sizing:border-box}body{margin:0;padding:2rem 2.5rem 3rem;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b1120;color:#e5e7eb}.page{max-width:1200px;margin:0 auto}h1{font-size:2rem;margin:0 0 .5rem}p{margin:0 0 1.5rem;color:#9ca3af}a{color:#60a5fa;text-decoration:none}a:hover{text-decoration:underline}table{width:100%;border-collapse:collapse;font-size:.9rem;background:#020617;border-radius:.75rem;border:1px solid #1f2937;box-shadow:0 24px 60px rgba(15,23,42,.7);overflow:hidden}th,td{border-bottom:1px solid #1f2937;padding:.5rem .75rem;vertical-align:top}th{background:#020617;font-weight:600;text-align:left}tr:last-child td{border-bottom:none}code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:.85rem;padding:.05rem .25rem;border-radius:.25rem;background:#020617;color:#93c5fd}td.comment{min-width:16rem}</style></head><body><div class="page"><h1>Example vocabulary</h1><p>Raw file: <a href="vocab.ttl">vocab.ttl</a></p><p>Used namespaces: <code>rdf:</code> = <code>http://www.w3.org/1999/02/22-rdf-syntax-ns#</code>, <code>rdfs:</code> = <code>http://www.w3.org/2000/01/rdf-schema#</code>.</p><table id="vocab-table"><thead><tr><th>Vocab</th><th>Type</th><th>Label</th><th>Comment</th><th>Domain</th><th>Range</th><th>Other&nbsp;attributes</th></tr></thead><tbody><tr><td colspan="7">Loading vocab.ttl…</td></tr></tbody></table></div><script>function cleanLiteral(o){const m=o.match(/^"([^"]*)"/);return m?m[1]:o}async function loadVocab(){const t=document.querySelector("#vocab-table tbody");try{const e=await fetch("vocab.ttl");if(!e.ok)throw new Error("HTTP "+e.status);const n=await e.text(),a=n.split(/\n\s*\n/),c=[];for(const n of a){const a=n.split("\n").map((o=>o.trim())).filter((o=>o&&!o.startsWith("@prefix")));if(!a.length||!a[0].startsWith("mnh:"))continue;const e=a[0].split(/\s+/)[0],s=a[0].slice(e.length).trim(),l=[];s&&l.push(s);for(let o=1;o<a.length;o++)l.push(a[o]);const r={vocab:e,type:[],label:[],comment:[],domain:[],range:[],other:[]};for(const o of l){const e=o.match(/^([a-zA-Z0-9_:]+)\s+(.+?)[;.]$/);if(!e)continue;const n=e[1],a=e[2].trim();switch(n){case"a":case"rdf:type":r.type.push(a);break;case"rdfs:label":r.label.push(cleanLiteral(a));break;case"rdfs:comment":r.comment.push(cleanLiteral(a));break;case"rdfs:domain":r.domain.push(a);break;case"rdfs:range":r.range.push(a);break;default:r.other.push(n+" "+a)}}c.push(r)}if(t.innerHTML="",!c.length){t.innerHTML="<tr><td colspan=\"7\">No mnh: vocab terms found in vocab.ttl.</td></tr>";return}for(const o of c){const e=document.createElement("tr");e.innerHTML=`<td><code>${o.vocab}</code></td><td>${o.type.map((o=>`<code>${o}</code>`)).join("<br>")}</td><td>${o.label.join("<br>")}</td><td class="comment">${o.comment.join("<br>")}</td><td>${o.domain.map((o=>`<code>${o}</code>`)).join("<br>")}</td><td>${o.range.map((o=>`<code>${o}</code>`)).join("<br>")}</td><td>${o.other.map((o=>`<code>${o}</code>`)).join("<br>")}</td>`,t.appendChild(e)}}catch(o){t.innerHTML="<tr><td colspan=\"7\">Failed to load vocab.ttl: "+o.message+"</td></tr>"}}loadVocab();</script></body></html>
