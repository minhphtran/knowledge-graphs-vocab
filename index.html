<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>Example vocabulary</title><style>:root{color-scheme:light dark}*{box-sizing:border-box}body{margin:0;padding:2rem 2.5rem 3rem;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b1120;color:#e5e7eb}.page{max-width:1200px;margin:0 auto}h1{font-size:2rem;margin:0 0 .5rem}p{margin:0 0 1.5rem;color:#9ca3af}a{color:#60a5fa;text-decoration:none}a:hover{text-decoration:underline}table{width:100%;border-collapse:collapse;font-size:.9rem;background:#020617;border-radius:.75rem;border:1px solid #1f2937;box-shadow:0 24px 60px rgba(15,23,42,.7);overflow:hidden}th,td{border-bottom:1px solid #1f2937;padding:.5rem .75rem;vertical-align:top}th{background:#020617;font-weight:600;text-align:left}tr:last-child td{border-bottom:none}code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:.85rem;padding:.05rem .25rem;border-radius:.25rem;background:#020617;color:#93c5fd}td.comment{min-width:16rem}.github-link{position:absolute;top:1rem;right:1rem;opacity:0.8;transition:opacity 0.2s}.github-link:hover{opacity:1}</style></head><body><div class="page"><a href="https://github.com/minhphtran/knowledge-graphs-vocab" class="github-link" target="_blank" rel="noopener"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a><h1>Example vocabulary</h1><p>Files: <a href="vocab.ttl">vocab.ttl</a> · <a href="data.ttl">data.ttl</a></p><p>Used namespaces: <code>rdf:</code> = <code>http://www.w3.org/1999/02/22-rdf-syntax-ns#</code>, <code>rdfs:</code> = <code>http://www.w3.org/2000/01/rdf-schema#</code>.</p><table id="vocab-table"><thead><tr><th>Vocab</th><th>Type</th><th>Label</th><th>Comment</th><th>Domain</th><th>Range</th></tr></thead><tbody><tr><td colspan="6">Loading vocab.ttl…</td></tr></tbody></table></div><script>function cleanLiteral(o){const m=o.match(/^"([^"]*)"/);return m?m[1]:o}async function loadVocab(){const t=document.querySelector("#vocab-table tbody");try{const e=await fetch("vocab.ttl");if(!e.ok)throw new Error("HTTP "+e.status);const n=await e.text(),a=n.split(/\n\s*\n/),c=[];for(const n of a){const a=n.split("\n").map((o=>o.trim())).filter((o=>o&&!o.startsWith("@prefix")));if(!a.length||!a[0].startsWith("mnh:"))continue;const e=a[0].split(/\s+/)[0],s=a[0].slice(e.length).trim(),l=[];s&&l.push(s);for(let o=1;o<a.length;o++)l.push(a[o]);const r={vocab:e,type:[],label:[],comment:[],domain:[],range:[]};for(const o of l){const e=o.match(/^([a-zA-Z0-9_:]+)\s+(.+?)[;.]$/);if(!e)continue;const n=e[1],a=e[2].trim();switch(n){case"a":case"rdf:type":r.type.push(a);break;case"rdfs:label":r.label.push(cleanLiteral(a));break;case"rdfs:comment":r.comment.push(cleanLiteral(a));break;case"rdfs:domain":r.domain.push(a);break;case"rdfs:range":r.range.push(a)}}c.push(r)}if(t.innerHTML="",!c.length){t.innerHTML="<tr><td colspan=\"6\">No mnh: vocab terms found in vocab.ttl.</td></tr>";return}for(const o of c){const e=document.createElement("tr");e.innerHTML=`<td><code>${o.vocab}</code></td><td>${o.type.map((o=>`<code>${o}</code>`)).join("<br>")}</td><td>${o.label.join("<br>")}</td><td class="comment">${o.comment.join("<br>")}</td><td>${o.domain.map((o=>`<code>${o}</code>`)).join("<br>")}</td><td>${o.range.map((o=>`<code>${o}</code>`)).join("<br>")}</td>`,t.appendChild(e)}}catch(o){t.innerHTML="<tr><td colspan=\"6\">Failed to load vocab.ttl: "+o.message+"</td></tr>"}}loadVocab();</script></body></html>
